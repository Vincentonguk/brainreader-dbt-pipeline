
name: 'brainreader_dbt'
version: '1.0.0'
config-version: 2

profile: 'brainreader_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  brainreader_dbt:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table
    semantic:
      +materialized: view
    exports:
      +materialized: table
    example:
      +enabled: false
      +materialized: view
